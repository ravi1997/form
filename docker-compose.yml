services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: form-service:latest
    container_name: form-service
    restart: unless-stopped
    environment:
      APP_ENV: production
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-formadmin}:${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in your environment}@mongo:27017/form_prod?authSource=admin
      MONGODB_DB: form_prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_DEFAULT_QUEUE: form_tasks
      CELERY_TASK_TIME_LIMIT: 300
      CELERY_TASK_SOFT_TIME_LIMIT: 240
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in your environment}
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: /app/logs
      ENABLE_COMPRESSION: ${ENABLE_COMPRESSION:-true}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:8
    container_name: form-mongo
    restart: unless-stopped
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-formadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in your environment}
    volumes:
      - mongo_data:/data/db
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: form-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: form-service:latest
    container_name: form-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.celery.app", "worker", "--loglevel=info"]
    environment:
      APP_ENV: production
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-formadmin}:${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in your environment}@mongo:27017/form_prod?authSource=admin
      MONGODB_DB: form_prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_DEFAULT_QUEUE: form_tasks
      CELERY_TASK_TIME_LIMIT: 300
      CELERY_TASK_SOFT_TIME_LIMIT: 240
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in your environment}
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: form-service:latest
    container_name: form-beat
    restart: unless-stopped
    command: ["celery", "-A", "app.celery.app", "beat", "--loglevel=info"]
    environment:
      APP_ENV: production
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-formadmin}:${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in your environment}@mongo:27017/form_prod?authSource=admin
      MONGODB_DB: form_prod
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_DEFAULT_QUEUE: form_tasks
      CELERY_TASK_TIME_LIMIT: 300
      CELERY_TASK_SOFT_TIME_LIMIT: 240
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in your environment}
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

volumes:
  mongo_data:
  app_logs:
  redis_data:

networks:
  appnet:
    driver: bridge
