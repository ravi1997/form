x-form-service-env: &form_service_env
  APP_ENV: ${APP_ENV:-production}
  MONGODB_URI: ${MONGODB_URI:?set MONGODB_URI in your .env file}
  MONGODB_DB: ${MONGODB_DB:-form_prod}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_TASK_DEFAULT_QUEUE: ${CELERY_TASK_DEFAULT_QUEUE:-form_tasks}
  CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-300}
  CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-240}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in your .env file}
  JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-v1}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_DIR: ${LOG_DIR:-/app/logs}
  ENABLE_COMPRESSION: ${ENABLE_COMPRESSION:-true}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
  ENABLE_SUPERADMIN_BOOTSTRAP: ${ENABLE_SUPERADMIN_BOOTSTRAP:-false}
  MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-formadmin}
  MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in your .env file}
  SUPERADMIN_NAME: ${SUPERADMIN_NAME:-}
  SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
  SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: form-service:latest
    container_name: form-service
    init: true
    restart: unless-stopped
    environment: *form_service_env
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:8
    container_name: form-mongo
    restart: unless-stopped
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-formadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: form-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: form-service:latest
    container_name: form-worker
    init: true
    restart: unless-stopped
    command: ["celery", "-A", "app.celery.worker", "worker", "--loglevel=info"]
    environment: *form_service_env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: form-service:latest
    container_name: form-beat
    init: true
    restart: unless-stopped
    command: ["celery", "-A", "app.celery.worker", "beat", "--loglevel=info"]
    environment: *form_service_env
    profiles: ["scheduler"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

volumes:
  mongo_data:
  app_logs:
  redis_data:

networks:
  appnet:
    driver: bridge
