version: '3.8'

# =============================================================================
#  docker-compose.dev.yml  —  Full Development Stack
#
#  ALL configuration is loaded from .env file.
#  Copy .env.example → .env and fill in your values before running.
#
#  Usage:
#    docker compose -f docker-compose.dev.yml up --build
#
#  Services & URLs:
#    App              http://localhost:5000        (hot-reload Flask)
#    Swagger UI       http://localhost:5000/apidocs
#    MongoDB GUI      http://localhost:8081        (Mongo Express)
#    Redis GUI        http://localhost:8082        (Redis Commander)
#    Mailhog          http://localhost:8025        (Email catcher)
#    MinIO Console    http://localhost:9001        (S3 storage UI)
#    Celery Worker    (background tasks)
#    Flower           http://localhost:5555        (Celery monitor)
#    Kibana           http://localhost:5601        (Log explorer)
#    Jaeger           http://localhost:16686       (Distributed tracing)
#    Portainer        http://localhost:9443        (Docker manager)
#    Locust           http://localhost:8089        (Load testing)
# =============================================================================

services:

  # ── Flask Application (Hot-Reload) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-5000}:5000"
      - "5678:5678"              # debugpy remote debugging
    volumes:
      - .:/app
      - /app/.venv
      - app_logs:/app/logs       # Shared log volume for Logstash
    env_file:
      - .env
    environment:
      FLASK_ENV: "development"
      FLASK_DEBUG: "1"
      MONGO_URI: "mongodb://mongodb:27017/"
      DATABASE_URL: "mongodb://mongodb:27017/form_response"
      RESPONSE_DATABASE_URL: "mongodb://mongodb:27017/form_response"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      MAIL_SERVER: "mailhog"
      MAIL_PORT: "1025"
      S3_ENDPOINT_URL: "http://minio:9000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_SERVICE_NAME: "unified-form-service"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    environment:
      MONGO_URI: "mongodb://mongodb:27017/"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      S3_ENDPOINT_URL: "http://minio:9000"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Flower (Celery Monitor UI) ────────────────────────────────────────────
  flower:
    image: mher/flower:latest
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/0"
      FLOWER_PORT: "5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - formnet

  # ── Mongo Express (MongoDB GUI) ───────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_EXPRESS_USER:-admin}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_EXPRESS_PASSWORD:-devpassword}"
      ME_CONFIG_OPTIONS_EDITORTHEME: dracula
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - formnet

  # ── Redis Commander (Redis GUI) ───────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── MinIO (S3-Compatible Storage) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_KEY:-minioadmin}"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - formnet

  # ── MinIO Init (create default bucket) ───────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-minioadmin} $${S3_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/$${S3_BUCKET_NAME:-form-uploads};
        mc anonymous set download local/$${S3_BUCKET_NAME:-form-uploads};
        echo 'MinIO bucket ready.';
      "
    networks:
      - formnet

  # ── Mailhog (Email Catcher) ───────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    restart: unless-stopped
    networks:
      - formnet

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - formnet

  # ── Logstash ──────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    ports:
      - "5044:5044"
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - app_logs:/logs:ro           # Read app JSON logs from shared volume
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
      FLASK_ENV: "${FLASK_ENV:-development}"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Kibana (Log Explorer UI) ──────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Jaeger (Distributed Tracing) ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "${JAEGER_PORT:-16686}:16686"  # Jaeger UI
      - "6831:6831/udp"               # Thrift UDP
      - "4317:4317"                   # OTLP gRPC
      - "4318:4318"                   # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped
    networks:
      - formnet

  # ── Portainer (Docker Management UI) ─────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "${PORTAINER_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always
    networks:
      - formnet

  # ── Locust (Load Testing) ─────────────────────────────────────────────────
  locust:
    image: locustio/locust:latest
    ports:
      - "${LOCUST_PORT:-8089}:8089"
    volumes:
      - ./docker/locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://app:5000
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - formnet

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
  redis_data:
  minio_data:
  elasticsearch_data:
  portainer_data:
  app_logs:

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  formnet:
    driver: bridge
