version: '3.8'

# =============================================================================
#  docker-compose.dev.yml  —  Development stack with hot-reload + full tooling
#
#  ALL configuration is loaded from .env file.
#  Copy .env.example → .env and fill in your values before running.
#
#  Usage:
#    docker compose -f docker-compose.dev.yml up --build
#
#  GUI Tools:
#    MongoDB GUI:  http://localhost:8081  (admin / devpassword)
#    Redis GUI:    http://localhost:8082
#    Mailhog:      http://localhost:8025
# =============================================================================

services:

  # ── Flask Application (Hot-Reload) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-5000}:5000"
      - "5678:5678"    # debugpy — VS Code / PyCharm remote debug port
    volumes:
      - .:/app         # Bind-mount source for instant hot-reload on save
      - /app/.venv     # Exclude host venv if present (use container's pip install)
    env_file:
      - .env
    # Override only Docker-internal service hostnames — everything else from .env
    environment:
      FLASK_ENV: "development"
      FLASK_DEBUG: "1"
      MONGO_URI: "mongodb://mongodb:27017/"
      DATABASE_URL: "mongodb://mongodb:27017/form_response"
      RESPONSE_DATABASE_URL: "mongodb://mongodb:27017/form_response"
      REDIS_URL: "redis://redis:6379/0"
      MAIL_SERVER: "mailhog"
      MAIL_PORT: "1025"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - formnet

  # ── Mongo Express (MongoDB GUI) ───────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_EXPRESS_USER:-admin}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_EXPRESS_PASSWORD:-devpassword}"
      ME_CONFIG_OPTIONS_EDITORTHEME: dracula
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - formnet

  # ── Redis Commander (Redis GUI) ───────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - formnet

  # ── Mailhog (Email Catcher) ───────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP — point MAIL_SERVER here
      - "${MAILHOG_UI_PORT:-8025}:8025"     # Web UI — view caught emails
    restart: unless-stopped
    networks:
      - formnet

volumes:
  mongodb_data:
  redis_data:

networks:
  formnet:
    driver: bridge
