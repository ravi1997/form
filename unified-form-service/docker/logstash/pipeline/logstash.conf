input {
  # Read JSON logs from the app container via shared volume
  file {
    path => "/logs/app.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["form-service"]
  }

  # Also accept logs pushed directly over TCP (optional)
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  # Parse timestamp from JSON log field
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "${FLASK_ENV:development}" }
    add_field => { "service" => "unified-form-service" }
  }

  # Parse HTTP method and path from message if present
  if [method] and [path] {
    mutate {
      add_tag => ["http_request"]
    }
  }

  # Tag errors and warnings
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
  if [level] == "WARNING" {
    mutate { add_tag => ["warning"] }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "form-service-logs-%{+YYYY.MM.dd}"
  }
  # Uncomment to debug in console:
  # stdout { codec => rubydebug }
}
