version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: form_builder_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: form_builder_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  web:
    build: .
    container_name: form_builder_web
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - DB_NAME=form_builder_db
      - JWT_SECRET=super-secret-key-change-in-prod
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=form-uploads
    depends_on:
      - mongodb
      - minio

volumes:
  mongo_data:
  minio_data:
