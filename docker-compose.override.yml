x-form-dev-env: &form_dev_env
  APP_ENV: development
  MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-formadmin}:${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in your environment}@mongo:27017/form_dev?authSource=admin
  MONGODB_DB: form_dev
  LOG_LEVEL: DEBUG
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Super Admin}
  SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@example.com}
  SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin123}

services:
  app:
    environment: *form_dev_env
    volumes:
      - ./:/app

  worker:
    environment: *form_dev_env

  beat:
    environment: *form_dev_env
