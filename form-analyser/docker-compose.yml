version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: form-analyser-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: form-analyser-redis
    ports:
      - "6379:6379"
    restart: always

  web:
    build: .
    container_name: form-analyser-web
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://db:27017/form_analyser
      - MONGO_DB_NAME=form_analyser
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - SECRET_KEY=dev-secret-key-change-me
      - AUTH_ENABLED=True
      - FORM_RESPONSES_COLLECTION=form_responses
      - ANALYSIS_DEFINITIONS_COLLECTION=analysis_definitions
      - ANALYSIS_RESULTS_COLLECTION=analysis_results
      - API_KEYS_COLLECTION=api_keys
      - WEBHOOKS_COLLECTION=webhooks
      - FORMS_COLLECTION=forms
    depends_on:
      - db
      - redis
    restart: always

  worker:
    build: .
    container_name: form-analyser-worker
    command: rq worker --url redis://redis:6379/0 analysis webhooks
    environment:
      - MONGO_URI=mongodb://db:27017/form_analyser
      - MONGO_DB_NAME=form_analyser
      - REDIS_URL=redis://redis:6379/0
      - FORM_RESPONSES_COLLECTION=form_responses
      - ANALYSIS_DEFINITIONS_COLLECTION=analysis_definitions
      - ANALYSIS_RESULTS_COLLECTION=analysis_results
      - WEBHOOKS_COLLECTION=webhooks
    depends_on:
      - db
      - redis
    restart: always

volumes:
  mongo_data:
